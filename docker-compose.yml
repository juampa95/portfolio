# Levanta el portfolio igual que en producción (Cloud Run): build de Vite +
# server Node sirviendo dist + API. Uso:  docker compose up --build
# Luego abrí http://localhost:8080
services:
  web:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
    restart: unless-stopped
